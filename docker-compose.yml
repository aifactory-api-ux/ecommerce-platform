version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://ecommerce:secretpassword@postgres:5432/ecommerce
      JWT_SECRET_KEY: supersecretjwtkey
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_HOURS: 24
    ports:
      - "23001:23001"
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: backend/product-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://ecommerce:secretpassword@postgres:5432/ecommerce
      JWT_SECRET_KEY: supersecretjwtkey
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_HOURS: 24
    ports:
      - "23002:23002"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://ecommerce:secretpassword@postgres:5432/ecommerce
      JWT_SECRET_KEY: supersecretjwtkey
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_HOURS: 24
    ports:
      - "23003:23003"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_AUTH_URL: http://auth-service:23001/auth
      VITE_API_PRODUCT_URL: http://product-service:23002/products
      VITE_API_ORDER_URL: http://order-service:23003/orders
    ports:
      - "24000:24000"
    depends_on:
      - auth-service
      - product-service
      - order-service

volumes:
  postgres_data:
  redis_data: