version: '3.8'

services:
  auth-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: auth_db
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: product_db
    ports:
      - "25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: order_db
    ports:
      - "25434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "23001:23001"
    environment:
      POSTGRES_HOST: auth-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWT_SECRET: supersecretjwtkey
      AUTH_JWT_EXPIRE_MINUTES: 60
      AUTH_JWT_REFRESH_EXPIRE_DAYS: 7
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:23001/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    ports:
      - "23002:23002"
    environment:
      POSTGRES_HOST: product-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: product_db
      AUTH_JWT_SECRET: supersecretjwtkey
    depends_on:
      product-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:23002/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    ports:
      - "23003:23003"
    environment:
      POSTGRES_HOST: order-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: order_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWT_SECRET: supersecretjwtkey
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 23002
    depends_on:
      order-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:23003/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "25173:80"
    environment:
      VITE_BACKEND_AUTH_URL: http://localhost:23001
      VITE_BACKEND_PRODUCT_URL: http://localhost:23002
      VITE_BACKEND_ORDER_URL: http://localhost:23003
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5